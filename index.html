<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Secret Verify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!--
    socket.io is loaded ONLY for session pages, dynamically inside JS below.
    Loading it globally on the home page caused io() to fire, connect to server,
    and socket event handlers would call renderView() which destroyed the static
    home HTML including the Create button — leaving the page dead.
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse { animation: pulse 1.8s ease-in-out infinite; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .25s ease-out; }
    .toast {
      position: fixed; top: 20px; right: 16px; left: 16px; max-width: 400px;
      margin: 0 auto; padding: 14px 20px; border-radius: 10px; color: #fff;
      font-weight: 600; font-size: 15px; z-index: 9999;
      animation: fadeUp .25s ease-out; box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    .toast-error  { background: #dc2626; }
    .toast-success{ background: #16a34a; }
  </style>
</head>
<body>

<div id="root" class="min-h-screen flex items-center justify-center p-4">

  <!-- HOME CARD: static HTML, always visible on /, never touched by JS -->
  <div id="home-card" class="max-w-md w-full">
    <div class="bg-white rounded-2xl p-8 shadow-2xl">
      <div class="text-center mb-7">
        <p class="text-5xl mb-3">🔐🗝️</p>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Secret Verify</h1>
        <p class="text-gray-400 text-sm">Secure secret sharing between holder and customer</p>
      </div>
      <label class="text-gray-700 font-semibold block mb-1">Your Secret Code</label>
      <p class="text-xs text-gray-400 mb-3">
        Share this code with your customer <strong>outside this app</strong>.
        You will compare it manually when they submit theirs.
      </p>
      <input
        id="code-home"
        type="text"
        placeholder="e.g. APPLE-7734"
        maxlength="100"
        autocomplete="off"
        class="w-full border-2 border-gray-200 rounded-xl px-4 py-4 text-gray-800
               text-center font-mono text-xl tracking-widest mb-5
               focus:outline-none focus:border-blue-500"
      >
      <button
        id="btn-create"
        class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-lg
               active:bg-blue-800 transition-colors select-none"
        onclick="onCreateClick()"
      >
        Create New Session
      </button>
      <div id="home-err" class="mt-4 text-red-600 text-sm font-semibold text-center hidden"></div>
    </div>
  </div>

  <!-- SESSION CARD: injected by JS for /session/... URLs -->
  <div id="session-card" class="max-w-lg w-full hidden"></div>

</div>

<script>
// ─────────────────────────────────────────────
//  PAGE DETECTION
// ─────────────────────────────────────────────
const _params      = new URLSearchParams(window.location.search);
const SESSION_ID   = (/\/session\/([^/?#]+)/.exec(window.location.pathname) || [])[1] || null;
const HOLDER_TOKEN = _params.get('holder') || null;

// ─────────────────────────────────────────────
//  HOME PAGE — Create Session
// ─────────────────────────────────────────────
async function onCreateClick() {
  const input = document.getElementById('code-home');
  const btn   = document.getElementById('btn-create');
  const errEl = document.getElementById('home-err');

  const code = input.value.trim();
  errEl.textContent = '';
  errEl.classList.add('hidden');

  if (!code) {
    errEl.textContent = 'Please enter a secret code first.';
    errEl.classList.remove('hidden');
    input.focus();
    return;
  }

  // Immediate visible feedback — confirms tap registered
  btn.disabled = true;
  btn.textContent = 'Creating session…';
  btn.classList.add('opacity-70');

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 15000);

    const res = await fetch('/api/create-session', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ secretCode: code }),
      signal:  controller.signal,
    });
    clearTimeout(timer);

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error ' + res.status);

    window.location.href = '/session/' + data.sessionId + '?holder=' + data.holderToken;

  } catch (err) {
    const msg = err.name === 'AbortError'
      ? 'Request timed out. Is the server running?'
      : err.message;
    errEl.textContent = '⚠ ' + msg;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Create New Session';
    btn.classList.remove('opacity-70');
  }
}

// Enter key on home input
document.getElementById('code-home').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') onCreateClick();
});

// ─────────────────────────────────────────────
//  SESSION PAGE
// ─────────────────────────────────────────────
if (SESSION_ID) {

  // Swap cards
  document.getElementById('home-card').classList.add('hidden');
  const sessionCard = document.getElementById('session-card');
  sessionCard.classList.remove('hidden');
  sessionCard.innerHTML = loadingCard('Loading session…');

  // State object
  var S = {
    isHolder:        !!HOLDER_TOKEN,
    status:          'pending',
    customerEmail:   null,
    customerCode:    null,
    codeRejected:    false,
    secretMessage:   null,
    secretExpiresAt: null,
    msgExpired:      false,
    timerInterval:   null,
  };

  // Dynamically load socket.io only here
  var sioTag = document.createElement('script');
  sioTag.src = 'https://cdn.socket.io/4.5.4/socket.io.min.js';
  sioTag.onload  = startSession;
  sioTag.onerror = function() {
    sessionCard.innerHTML = errorCard('Failed to load Socket.io. Check your connection.', true);
  };
  document.head.appendChild(sioTag);

  function startSession() {
    var socket = io();
    socket.emit('join-session', SESSION_ID);

    socket.on('customer-submitted-email', function(d) {
      S.customerEmail = d.email;
      S.status = 'pending_approval';
      draw();
    });
    socket.on('customer-approved', function() {
      S.status = 'code_entry';
      S.codeRejected = false;
      if (!S.isHolder) toast('Email approved! Enter your secret code.', 'success');
      draw();
    });
    socket.on('customer-submitted-code', function(d) {
      S.customerCode = d.code;
      S.status = 'pending_code_approval';
      draw();
    });
    socket.on('code-approved', function() {
      S.status = 'verified';
      S.customerCode = null;
      if (!S.isHolder) toast('Code verified! Waiting for secret message…', 'success');
      draw();
    });
    socket.on('code-rejected', function() {
      S.status = 'code_entry';
      S.customerCode = null;
      S.codeRejected = true;
      if (!S.isHolder) toast('Incorrect code — please try again.', 'error');
      draw();
    });
    socket.on('secret-message', function(d) {
      S.secretMessage   = d.message;
      S.secretExpiresAt = Date.now() + d.expiresIn * 1000;
      S.msgExpired = false;
      startTimer();
      if (!S.isHolder) toast('Secret message received!', 'success');
      draw();
    });

    // Hydrate state on load / page refresh
    fetch('/api/session/' + SESSION_ID, {
      headers: HOLDER_TOKEN ? { 'Authorization': 'Bearer ' + HOLDER_TOKEN } : {}
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      S.isHolder      = d.isHolder || !!HOLDER_TOKEN;
      S.status        = d.status;
      S.customerEmail = (d.customer && d.customer.email) || null;
      S.customerCode  = d.customerCode || null;
      S.secretMessage = d.secretMessage || null;
      if (d.secretMessageExpiresAt) {
        S.secretExpiresAt = new Date(d.secretMessageExpiresAt).getTime();
        if (Date.now() > S.secretExpiresAt) { S.msgExpired = true; }
        else { startTimer(); }
      }
      draw();
    })
    .catch(function() {
      sessionCard.innerHTML = errorCard('Could not load session. It may have expired.', true);
    });

    // ── API actions (attached to window so onclick= can find them) ──

    window.doSubmitEmail = async function() {
      var el = document.getElementById('inp-email');
      var email = el ? el.value.trim() : '';
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        return toast('Enter a valid email address.', 'error');
      }
      disableBtn('btn-email', 'Submitting…');
      try {
        var r = await post('/api/session/' + SESSION_ID + '/customer-email', { email: email });
        var body = await r.json();
        if (!r.ok) throw new Error(body.error);
        S.customerEmail = email;
        S.status = 'pending_approval';
        draw();
      } catch(e) {
        toast(e.message, 'error');
        enableBtn('btn-email', 'Submit Email');
      }
    };

    window.doApproveCustomer = async function() {
      disableBtn('btn-approve-email', 'Approving…');
      try {
        var r = await authPost('/api/session/' + SESSION_ID + '/approve-customer');
        if (!r.ok) throw new Error((await r.json()).error);
        // socket event redraws both sides
      } catch(e) {
        toast(e.message, 'error');
        enableBtn('btn-approve-email', '✓ Approve Email');
      }
    };

    window.doSubmitCode = async function() {
      var el = document.getElementById('inp-code');
      var code = el ? el.value.trim() : '';
      if (!code) return toast('Please enter the secret code.', 'error');
      disableBtn('btn-code', 'Submitting…');
      try {
        var r = await post('/api/session/' + SESSION_ID + '/submit-code', { code: code });
        var body = await r.json();
        if (!r.ok) throw new Error(body.error);
        S.status = 'pending_code_approval';
        S.codeRejected = false;
        draw();
      } catch(e) {
        toast(e.message, 'error');
        enableBtn('btn-code', 'Submit Code');
      }
    };

    window.doApproveCode = async function() {
      disableBtn('btn-approve-code', 'Approving…');
      try {
        var r = await authPost('/api/session/' + SESSION_ID + '/approve-code');
        if (!r.ok) throw new Error((await r.json()).error);
      } catch(e) {
        toast(e.message, 'error');
        enableBtn('btn-approve-code', '✓ Approve');
      }
    };

    window.doRejectCode = async function() {
      disableBtn('btn-reject-code', 'Rejecting…');
      try {
        var r = await authPost('/api/session/' + SESSION_ID + '/reject-code');
        if (!r.ok) throw new Error((await r.json()).error);
      } catch(e) {
        toast(e.message, 'error');
        enableBtn('btn-reject-code', '✗ Reject');
      }
    };

    window.doSendMessage = async function() {
      var el = document.getElementById('inp-message');
      var msg = el ? el.value.trim() : '';
      if (!msg) return toast('Please type a message.', 'error');
      disableBtn('btn-send', 'Sending…');
      try {
        var r = await authPost('/api/session/' + SESSION_ID + '/send-message', { message: msg });
        if (!r.ok) throw new Error((await r.json()).error);
        toast('Secret message sent!', 'success');
        if (el) el.value = '';
        enableBtn('btn-send', '📤 Send Secret Message');
      } catch(e) {
        toast(e.message, 'error');
        enableBtn('btn-send', '📤 Send Secret Message');
      }
    };

    window.doCopyLink = function() {
      copyText(location.origin + '/session/' + SESSION_ID, 'Customer link copied!');
    };

    window.doCopyMessage = function() {
      if (!S.secretMessage || S.msgExpired) return;
      copyText(S.secretMessage, 'Message copied!');
    };

    // ── Draw ──
    function draw() {
      if (S.isHolder) drawHolder(); else drawCustomer();
    }

    function drawHolder() {
      var link = location.origin + '/session/' + SESSION_ID;
      var body = '';

      if (S.status === 'pending') {
        body = '<div class="bg-gray-50 border border-gray-200 rounded-xl p-8 text-center">'
          + spinnerHTML()
          + '<p class="text-gray-400 text-sm mt-3 pulse">Waiting for customer to open the link…</p>'
          + '</div>';
      }
      else if (S.status === 'pending_approval') {
        body = '<div class="bg-blue-50 border border-blue-200 rounded-xl p-5 mb-4">'
          + '<p class="text-gray-600 font-semibold text-sm mb-2">Customer Email:</p>'
          + '<p class="font-mono text-lg font-bold text-blue-700 break-all">' + esc(S.customerEmail) + '</p>'
          + '<p class="text-xs text-gray-400 mt-2">Confirm this is your customer, then approve.</p>'
          + '</div>'
          + '<button id="btn-approve-email" onclick="doApproveCustomer()" '
          + 'class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg active:bg-green-800">'
          + '✓ Approve Email</button>';
      }
      else if (S.status === 'code_entry') {
        body = '<div class="bg-gray-50 border border-gray-200 rounded-xl p-5">'
          + '<p class="text-gray-500 text-sm font-semibold mb-1">Approved:</p>'
          + '<p class="font-mono text-blue-600 mb-4">' + esc(S.customerEmail) + '</p>'
          + spinnerHTML()
          + '<p class="text-gray-400 text-sm text-center mt-3 pulse">Waiting for customer to enter the code…</p>'
          + '</div>';
      }
      else if (S.status === 'pending_code_approval') {
        body = '<div class="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-5 mb-4">'
          + '<p class="text-gray-600 font-semibold text-sm mb-2">Code submitted by customer:</p>'
          + '<p class="font-mono text-3xl font-black text-center text-yellow-700 '
          + 'bg-white px-4 py-5 rounded-xl border border-yellow-300 tracking-widest">'
          + esc(S.customerCode || '—') + '</p>'
          + '<p class="text-xs text-gray-400 text-center mt-3">Compare with your code and decide.</p>'
          + '</div>'
          + '<div class="flex gap-3">'
          + '<button id="btn-approve-code" onclick="doApproveCode()" '
          + 'class="flex-1 bg-green-600 text-white font-bold py-4 rounded-xl text-lg active:bg-green-800">✓ Approve</button>'
          + '<button id="btn-reject-code" onclick="doRejectCode()" '
          + 'class="flex-1 bg-red-500 text-white font-bold py-4 rounded-xl text-lg active:bg-red-700">✗ Reject</button>'
          + '</div>';
      }
      else if (S.status === 'verified') {
        body = '<div class="bg-green-50 border border-green-300 rounded-xl p-4 mb-5 text-center">'
          + '<p class="text-green-700 font-bold">✅ ' + esc(S.customerEmail) + ' — Verified</p>'
          + '</div>'
          + '<label class="text-gray-700 font-semibold block mb-1">Send Secret Message</label>'
          + '<p class="text-xs text-gray-400 mb-3">⚠ Customer sees it for 60 seconds only.</p>'
          + '<textarea id="inp-message" maxlength="5000" placeholder="Type your secret message…" '
          + 'class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-800 '
          + 'h-32 mb-3 focus:outline-none focus:border-blue-500 resize-none"></textarea>'
          + '<button id="btn-send" onclick="doSendMessage()" '
          + 'class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-lg active:bg-blue-800">'
          + '📤 Send Secret Message</button>';
      }

      sessionCard.innerHTML = '<div class="bg-white rounded-2xl p-7 shadow-2xl fade-up">'
        + '<h2 class="text-2xl font-bold text-gray-800 mb-1">🔐 Holder Dashboard</h2>'
        + '<p class="text-xs text-gray-400 mb-5 font-mono">' + SESSION_ID + '</p>'
        + '<div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-6">'
        + '<p class="text-indigo-800 font-semibold text-sm mb-2">📤 Customer session link:</p>'
        + '<p class="font-mono text-xs text-indigo-600 bg-white border border-indigo-200 '
        + 'rounded-lg px-3 py-2 break-all mb-3">' + esc(link) + '</p>'
        + '<button onclick="doCopyLink()" '
        + 'class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg text-sm active:bg-indigo-800">'
        + '📋 Copy Link</button></div>'
        + body
        + '</div>';
    }

    function drawCustomer() {
      var body = '';

      if (S.status === 'pending') {
        body = '<label class="text-gray-600 font-semibold block mb-1">Step 1 — Enter Your Email</label>'
          + '<p class="text-xs text-gray-400 mb-4">So the holder can confirm who you are.</p>'
          + '<input id="inp-email" type="email" placeholder="your@email.com" '
          + 'class="w-full border-2 border-gray-200 rounded-xl px-4 py-4 text-gray-800 text-lg '
          + 'mb-4 focus:outline-none focus:border-blue-500">'
          + '<button id="btn-email" onclick="doSubmitEmail()" '
          + 'class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-lg active:bg-blue-800">'
          + 'Submit Email</button>';
      }
      else if (S.status === 'pending_approval') {
        body = '<p class="text-gray-500 text-sm mb-1">Email submitted:</p>'
          + '<p class="font-mono text-blue-600 font-bold mb-6">' + esc(S.customerEmail) + '</p>'
          + spinnerHTML()
          + '<p class="text-gray-400 text-sm text-center mt-3 pulse">Waiting for holder to approve your email…</p>';
      }
      else if (S.status === 'code_entry') {
        body = '<label class="text-gray-600 font-semibold block mb-1">Step 2 — Enter Secret Code</label>'
          + (S.codeRejected
              ? '<p class="text-sm text-red-500 font-bold mb-3">❌ Wrong code — please try again.</p>'
              : '<p class="text-xs text-gray-400 mb-4">Enter the code you received from the holder.</p>')
          + '<input id="inp-code" type="text" placeholder="Enter code" maxlength="100" autocomplete="off" '
          + 'class="w-full border-2 border-gray-200 rounded-xl px-4 py-4 text-gray-800 '
          + 'text-center font-mono text-xl tracking-widest mb-4 focus:outline-none focus:border-blue-500">'
          + '<button id="btn-code" onclick="doSubmitCode()" '
          + 'class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-lg active:bg-blue-800">'
          + 'Submit Code</button>';
      }
      else if (S.status === 'pending_code_approval') {
        body = spinnerHTML()
          + '<p class="text-gray-400 text-sm text-center mt-3 pulse">Holder is verifying your code…</p>';
      }
      else if (S.status === 'verified') {
        if (S.secretMessage && !S.msgExpired) {
          var secs = Math.max(0, Math.floor((S.secretExpiresAt - Date.now()) / 1000));
          body = '<p class="text-gray-600 font-semibold mb-3">🔐 Secret Message:</p>'
            + '<div class="bg-green-50 border-2 border-green-500 rounded-xl p-5 mb-4">'
            + '<p class="text-gray-800 text-lg leading-relaxed break-words">' + esc(S.secretMessage) + '</p>'
            + '</div>'
            + '<div class="bg-yellow-50 border border-yellow-300 rounded-xl p-4 text-center mb-4">'
            + '<p id="msg-timer" class="font-black text-3xl ' + (secs < 10 ? 'text-red-600' : 'text-blue-600') + '">'
            + '⏱ ' + secs + 's</p>'
            + '<p class="text-xs text-gray-400 mt-1">Message self-destructs</p>'
            + '</div>'
            + '<button onclick="doCopyMessage()" '
            + 'class="w-full bg-green-600 text-white font-bold py-3 rounded-xl active:bg-green-800">'
            + '📋 Copy Message</button>';
        } else if (S.msgExpired) {
