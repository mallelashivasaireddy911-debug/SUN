<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure secret verification platform">
  <title>🔐 Secret Verify</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .pulse-animate { animation: pulse 1.5s ease-in-out infinite; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spin { animation: spin 1s linear infinite; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 1000;
      animation: fadeIn 0.3s ease-out;
    }
    .toast-error { background: #dc2626; }
    .toast-success { background: #16a34a; }
  </style>
</head>
<body>
  <!--
    The home page content is rendered directly in HTML.
    This means the home page ALWAYS shows immediately, even before
    any JavaScript runs. JS only takes over for /session/... pages.
  -->
  <div id="app" class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <div class="bg-white rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-6">
          <p class="text-5xl mb-3">🔐🗝️</p>
          <h2 class="text-3xl font-bold text-gray-800 mb-2">Secret Verify</h2>
          <p class="text-gray-500 text-sm">Secure secret sharing between holder and customer</p>
        </div>

        <div class="mb-5">
          <label class="text-gray-700 font-semibold block mb-1">Your Secret Code</label>
          <p class="text-xs text-gray-400 mb-2">
            This is the code you'll compare against what the customer enters.
            Share it with them manually (out of this app).
          </p>
          <input id="secret-code-input"
            type="text"
            placeholder="e.g. APPLE123"
            maxlength="100"
            autocomplete="off"
            class="w-full border-2 border-gray-300 rounded-lg px-4 py-3 text-gray-800
                   text-center font-mono text-xl tracking-widest
                   focus:outline-none focus:border-blue-500">
        </div>

        <button id="create-btn"
          onclick="createSession()"
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                 text-white font-bold py-4 px-6 rounded-xl transition text-lg">
          Create New Session
        </button>
      </div>
    </div>
  </div>

  <script>
    // ============ STATE ============
    // Single source of truth. Updated by socket events & initial API fetch.
    let state = {
      sessionId: window.location.pathname.split('/session/')[1] || null,
      holderToken: new URLSearchParams(window.location.search).get('holder'),
      isHolder: false,
      // possible values: pending | pending_approval | code_entry |
      //                  pending_code_approval | verified
      status: 'pending',
      customer: { email: null, emailApproved: false },
      customerCode: null,          // Holder-only: code submitted by customer
      codeWasRejected: false,      // Customer UX: show "try again" hint
      secretMessage: null,
      secretMessageExpiresAt: null,
      messageExpired: false,
      socket: null,
    };

    // ============ SOCKET.IO ============
    function initSocket() {
      state.socket = io();

      if (state.sessionId) {
        state.socket.emit('join-session', state.sessionId);
      }

      // Holder screen: customer typed their email
      state.socket.on('customer-submitted-email', (data) => {
        state.customer.email = data.email;
        state.status = 'pending_approval';
        renderView();
      });

      // Both screens: holder approved the email
      // Customer immediately moves to code entry
      state.socket.on('customer-approved', () => {
        state.customer.emailApproved = true;
        state.status = 'code_entry';
        state.codeWasRejected = false;
        if (!state.isHolder) showSuccess('Email approved! Enter your secret code.');
        renderView();
      });

      // Holder screen: customer submitted a code, holder must decide
      state.socket.on('customer-submitted-code', (data) => {
        state.customerCode = data.code;
        state.status = 'pending_code_approval';
        renderView();
      });

      // Both screens: holder approved the code → verified
      state.socket.on('code-approved', () => {
        state.status = 'verified';
        state.customerCode = null;
        if (!state.isHolder) showSuccess('Code verified! Waiting for secret message...');
        renderView();
      });

      // Customer screen: holder rejected the code → retry
      state.socket.on('code-rejected', () => {
        state.status = 'code_entry';
        state.customerCode = null;
        state.codeWasRejected = true;
        if (!state.isHolder) showError('Incorrect code. Please try again.');
        renderView();
      });

      // Both screens: holder sent the secret message
      state.socket.on('secret-message', (data) => {
        state.secretMessage = data.message;
        state.secretMessageExpiresAt = new Date(Date.now() + data.expiresIn * 1000);
        state.messageExpired = false;
        startMessageTimer();
        if (!state.isHolder) showSuccess('Secret message received!');
        renderView();
      });
    }

    // ============ TIMERS ============
    function startMessageTimer() {
      const interval = setInterval(() => {
        if (new Date() > state.secretMessageExpiresAt) {
          state.messageExpired = true;
          clearInterval(interval);
          renderView();
        } else {
          // Only re-render the timer portion to avoid disrupting input fields
          const timerEl = document.getElementById('msg-timer');
          if (timerEl) {
            const secs = getTimeRemaining(state.secretMessageExpiresAt);
            timerEl.textContent = `⏱️ ${secs}s`;
            timerEl.className = secs < 10 ? 'font-bold text-2xl text-red-600' : 'font-bold text-2xl text-blue-600';
          }
        }
      }, 500);
    }

    function getTimeRemaining(expiresAt) {
      return Math.max(0, Math.floor((new Date(expiresAt) - new Date()) / 1000));
    }

    // ============ UTILITIES ============
    function showError(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast toast-error';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function showSuccess(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast toast-success';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function loadingSpinner(label) {
      return `
        <div class="flex flex-col items-center gap-4 py-6">
          <svg class="w-10 h-10 text-blue-500 spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <p class="text-gray-500 text-base pulse-animate">${label}</p>
        </div>
      `;
    }

    // ============ API CALLS ============

    async function createSession() {
      const input = document.getElementById('secret-code-input');
      const code = input ? input.value.trim() : '';

      if (!code) {
        showError('Please enter a secret code first');
        if (input) input.focus();
        return;
      }

      // Visual feedback while creating
      const btn = document.getElementById('create-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Creating session...'; }

      try {
        const res = await fetch('/api/create-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secretCode: code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');
        // Redirect holder to their dashboard
        window.location.href = `/session/${data.sessionId}?holder=${data.holderToken}`;
      } catch (err) {
        showError('Failed to create session: ' + err.message);
        if (btn) { btn.disabled = false; btn.textContent = 'Create New Session'; }
      }
    }

    async function submitEmail() {
      const email = document.getElementById('email-input')?.value?.trim();
      if (!email) { showError('Please enter your email address'); return; }

      try {
        const res = await fetch(`/api/session/${state.sessionId}/customer-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to submit email');
        // Update local state immediately so customer sees waiting screen
        state.customer.email = email;
        state.status = 'pending_approval';
        renderView();
      } catch (err) {
        showError(err.message);
      }
    }

    async function approveCustomer() {
      try {
        const res = await fetch(`/api/session/${state.sessionId}/approve-customer`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${state.holderToken}`,
            'Content-Type': 'application/json',
          },
        });
        if (!res.ok) throw new Error('Failed to approve');
        // Socket event 'customer-approved' will update both screens
      } catch (err) {
        showError(err.message);
      }
    }

    async function submitCode() {
      const code = document.getElementById('code-input')?.value?.trim();
      if (!code) { showError('Please enter the secret code'); return; }

      try {
        const res = await fetch(`/api/session/${state.sessionId}/submit-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to submit code');
        // Move customer to waiting state immediately
        state.status = 'pending_code_approval';
        state.codeWasRejected = false;
        renderView();
      } catch (err) {
        showError(err.message);
      }
    }

    async function approveCode() {
      try {
        const res = await fetch(`/api/session/${state.sessionId}/approve-code`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${state.holderToken}`,
            'Content-Type': 'application/json',
          },
        });
        if (!res.ok) throw new Error('Failed to approve code');
        // Socket event 'code-approved' will update both screens
      } catch (err) {
        showError(err.message);
      }
    }

    async function rejectCode() {
      try {
        const res = await fetch(`/api/session/${state.sessionId}/reject-code`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${state.holderToken}`,
            'Content-Type': 'application/json',
          },
        });
        if (!res.ok) throw new Error('Failed to reject code');
        // Socket event 'code-rejected' will update both screens
      } catch (err) {
        showError(err.message);
      }
    }

    async function sendMessage() {
      const message = document.getElementById('message-input')?.value?.trim();
      if (!message) { showError('Please enter a message'); return; }

      try {
        const res = await fetch(`/api/session/${state.sessionId}/send-message`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${state.holderToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message }),
        });
        if (!res.ok) throw new Error('Failed to send message');
        showSuccess('Secret message sent!');
        document.getElementById('message-input').value = '';
      } catch (err) {
        showError(err.message);
      }
    }

    function copyMessage() {
      if (state.messageExpired || !state.secretMessage) return;
      navigator.clipboard.writeText(state.secretMessage);
      showSuccess('Message copied to clipboard!');
    }

    function copyCustomerLink() {
      const link = `${window.location.origin}/session/${state.sessionId}`;
      navigator.clipboard.writeText(link).then(() => {
        showSuccess('Customer link copied! Share this with your customer.');
      }).catch(() => {
        // Fallback for browsers that block clipboard
        const ta = document.createElement('textarea');
        ta.value = link;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showSuccess('Customer link copied!');
      });
    }

    // ============ RENDER HOME ============
    function renderHome() {
      document.getElementById('app').innerHTML = `
        <div class="max-w-md w-full">
          <div class="bg-white rounded-2xl p-8 shadow-2xl fade-in">
            <div class="text-center mb-6">
              <p class="text-5xl mb-3">🔐🗝️</p>
              <h2 class="text-3xl font-bold text-gray-800 mb-2">Secret Verify</h2>
              <p class="text-gray-500 text-sm">Secure secret sharing between holder and customer</p>
            </div>
            <div class="mb-5">
              <label class="text-gray-700 font-semibold block mb-1">Your Secret Code</label>
              <p class="text-xs text-gray-400 mb-2">
                Share this with your customer out of the app.
              </p>
              <input id="secret-code-input" type="text" placeholder="e.g. APPLE123"
                maxlength="100" autocomplete="off"
                class="w-full border-2 border-gray-300 rounded-lg px-4 py-3 text-gray-800
                       text-center font-mono text-xl tracking-widest
                       focus:outline-none focus:border-blue-500">
            </div>
            <button id="create-btn" onclick="createSession()"
              class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                     text-white font-bold py-4 px-6 rounded-xl transition text-lg">
              Create New Session
            </button>
          </div>
        </div>
      `;
    }

    // ============ RENDER HOLDER ============
    function renderHolderView() {
      const app = document.getElementById('app');
      const customerLink = `${window.location.origin}/session/${state.sessionId}`;
      let content = `
        <div class="max-w-lg w-full">
          <div class="bg-white rounded-2xl p-8 shadow-2xl fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-1">🔐 Holder Dashboard</h2>
            <p class="text-xs text-gray-400 mb-5">Session: <span class="font-mono">${state.sessionId}</span></p>

            <!-- Customer link share box — always visible -->
            <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-6">
              <p class="text-indigo-800 font-semibold text-sm mb-2">📤 Share this link with your customer:</p>
              <p class="font-mono text-xs text-indigo-600 bg-white border border-indigo-200 rounded-lg px-3 py-2 break-all mb-3">
                ${customerLink}
              </p>
              <button onclick="copyCustomerLink()"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg text-sm transition">
                📋 Copy Customer Link
              </button>
            </div>
      `;

      // ── STEP: Waiting for customer to join ──
      if (state.status === 'pending') {
        content += `
          <div class="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center">
            ${loadingSpinner('Waiting for customer to open the session link...')}
          </div>
        `;
      }

      // ── STEP: Customer submitted email → holder approves ──
      if (state.status === 'pending_approval') {
        content += `
          <div class="bg-blue-50 border border-blue-200 rounded-xl p-6 mb-4">
            <p class="text-gray-600 font-semibold mb-1">Customer Email:</p>
            <p class="font-mono text-lg bg-white px-4 py-3 rounded-lg text-blue-700 border border-blue-200 break-all">
              ${state.customer.email}
            </p>
            <p class="text-sm text-gray-500 mt-3">Verify this is the correct customer, then approve.</p>
          </div>
          <button onclick="approveCustomer()"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
            ✓ Approve Email
          </button>
        `;
      }

      // ── STEP: Email approved → waiting for customer to enter code ──
      if (state.status === 'code_entry') {
        content += `
          <div class="bg-gray-50 border border-gray-200 rounded-xl p-6">
            <p class="text-gray-600 font-semibold mb-1">Customer Email:</p>
            <p class="font-mono text-blue-600 mb-4">${state.customer.email}</p>
            ${loadingSpinner('Waiting for customer to enter the secret code...')}
          </div>
        `;
      }

      // ── STEP: Customer submitted code → holder sees it and decides ──
      if (state.status === 'pending_code_approval') {
        content += `
          <div class="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-6 mb-4">
            <p class="text-gray-600 font-semibold mb-1">Customer's Submitted Code:</p>
            <p class="font-mono text-2xl font-bold text-center text-yellow-700 bg-white px-4 py-4 rounded-lg border border-yellow-300 tracking-widest mt-2">
              ${state.customerCode || '—'}
            </p>
            <p class="text-sm text-gray-500 mt-3 text-center">Compare this with your secret code and decide.</p>
          </div>
          <div class="flex gap-3">
            <button onclick="approveCode()"
              class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
              ✓ Approve
            </button>
            <button onclick="rejectCode()"
              class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition">
              ✗ Reject / Retry
            </button>
          </div>
        `;
      }

      // ── STEP: Verified → send secret message ──
      if (state.status === 'verified') {
        content += `
          <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6 text-center">
            <p class="text-green-700 font-semibold">✅ Customer Verified — ${state.customer.email}</p>
          </div>
          <div class="bg-gray-50 border border-gray-200 rounded-xl p-6">
            <label class="text-gray-700 font-semibold block mb-2">Send Secret Message:</label>
            <textarea id="message-input" placeholder="Type your secret message here..."
              maxlength="5000"
              class="w-full border-2 border-gra
